name: Build Fadence Calc APK and Send to Telegram

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fadence-calc-manual-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Optimized Release APK
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Show build environment
        shell: bash
        run: |
          echo "Java version:"
          java -version

          echo
          echo "Gradle version:"
          ./gradlew --version

          echo
          echo "Android SDK root:"
          echo "${ANDROID_SDK_ROOT:-Not defined}"

          echo
          echo "Installed Android platforms:"
          ls -la "${ANDROID_SDK_ROOT}/platforms" 2>/dev/null || true

      - name: Read application information
        id: app_info
        shell: bash
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' \
            app/build.gradle.kts | head -n 1)

          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' \
            app/build.gradle.kts | head -n 1)

          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="unknown"
          fi

          if [ -z "$VERSION_CODE" ]; then
            VERSION_CODE="unknown"
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

          echo "Version name: $VERSION_NAME"
          echo "Version code: $VERSION_CODE"
          echo "Commit: $SHORT_SHA"

      - name: Build optimized release APK
        shell: bash
        run: |
          ./gradlew clean assembleRelease \
            --no-daemon \
            --stacktrace \
            --info

      - name: Find and rename APK
        id: apk
        shell: bash
        run: |
          ORIGINAL_APK=$(find app/build/outputs/apk/release \
            -type f \
            -name "*.apk" \
            | head -n 1)

          if [ -z "$ORIGINAL_APK" ]; then
            echo "Error: No APK file was found."

            echo "Available output files:"
            find app/build/outputs -type f 2>/dev/null || true

            exit 1
          fi

          mkdir -p output

          APK_NAME="FadenceCalc_${{ steps.app_info.outputs.version_name }}_${{ steps.app_info.outputs.short_sha }}_release.apk"
          APK_PATH="output/${APK_NAME}"

          cp "$ORIGINAL_APK" "$APK_PATH"

          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

          echo "APK successfully prepared:"
          ls -lh "$APK_PATH"

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          sha256sum "${{ steps.apk.outputs.path }}" \
            > "${{ steps.apk.outputs.path }}.sha256"

          echo "SHA-256 checksum:"
          cat "${{ steps.apk.outputs.path }}.sha256"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FadenceCalc-${{ steps.app_info.outputs.version_name }}-${{ steps.app_info.outputs.short_sha }}
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Validate Telegram secrets
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "Error: TELEGRAM_BOT_TOKEN is not configured."
            exit 1
          fi

          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Error: TELEGRAM_CHAT_ID is not configured."
            exit 1
          fi

      - name: Send APK to Telegram
        shell: bash
        run: |
          CAPTION=$(cat <<EOF
          ✅ Fadence Calc APK Build Successful

          File: ${{ steps.apk.outputs.name }}
          Version: ${{ steps.app_info.outputs.version_name }}
          Version code: ${{ steps.app_info.outputs.version_code }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ steps.app_info.outputs.short_sha }}
          Triggered by: ${{ github.actor }}
          Workflow run: #${{ github.run_number }}
          EOF
          )

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
            --form "document=@${{ steps.apk.outputs.path }}" \
            --form-string "caption=${CAPTION}"

          echo
          echo "APK successfully sent to Telegram."

      - name: Send failure notification to Telegram
        if: failure()
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are unavailable. Skipping failure notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          ❌ Fadence Calc APK Build Failed

          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Workflow run: #${{ github.run_number }}

          Build log:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          curl \
            --silent \
            --show-error \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true
